<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Přihlášení · {{ app_name }}</title>
  <link rel="icon" href="data:,">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #16233f 0%, #0b1220 60%); color: #e5e7eb;
    }
    .card {
      width: min(92vw, 360px); background: #111a2e; border: 1px solid #1f2a44;
      border-radius: 14px; padding: 28px 26px; box-shadow: 0 10px 40px rgba(0,0,0,.45);
    }
    .brand { font-size: 20px; font-weight: 700; margin: 0 0 2px; }
    .tag { font-size: 12px; color: #7c8aa5; margin: 0 0 20px; }
    label { display: block; font-size: 12px; color: #9fb0cc; margin: 14px 0 6px; }
    input {
      width: 100%; padding: 11px 12px; font-size: 15px; color: #e5e7eb;
      background: #0b1220; border: 1px solid #243150; border-radius: 9px; outline: none;
    }
    input:focus { border-color: #3b82f6; }
    button {
      width: 100%; margin-top: 20px; padding: 11px 12px; font-size: 15px; font-weight: 600;
      color: #fff; background: #2563eb; border: 0; border-radius: 9px; cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .err {
      margin-top: 14px; padding: 9px 11px; font-size: 13px; color: #fecaca;
      background: #3b1113; border: 1px solid #7f1d1d; border-radius: 8px;
    }
  </style>
</head>
<body>
  <form class="card" method="post" action="/login" autocomplete="on">
    <h1 class="brand">{{ app_name }}</h1>
    <p class="tag">{{ app_tagline }}</p>
    <input type="hidden" name="next" value="{{ next }}">

    <label for="username">Uživatel</label>
    <input id="username" name="username" type="text" autocomplete="username"
           autocapitalize="off" autocorrect="off" spellcheck="false" autofocus required>

    <label for="password">Heslo</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>

    {% if error %}<div class="err">{{ error }}</div>{% endif %}

    <button type="submit">Přihlásit se</button>
  </form>
</body>
</html>
